name: Build and Release ISPG Conversion Add-in

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1
    
    - name: Setup NuGet
      uses: nuget/setup-nuget@v1
    
    - name: Restore NuGet packages
      run: nuget restore ISPG.Conversion.sln
    
    - name: Build solution (Revit 2025)
      run: msbuild ISPG.Conversion.sln /p:Configuration=Release /p:Platform=x64
    
    - name: Create installer package
      shell: pwsh
      run: |
        # Create installer directory structure
        New-Item -ItemType Directory -Force -Path "installer/Revit2025"
        
        # Copy DLL
        Copy-Item "ISPG.Conversion\bin\x64\Release\ISPG.Conversion.dll" "installer\Revit2025\"
        
        # Create .addin manifest
        $addinContent = @"
        <?xml version="1.0" encoding="utf-8"?>
        <RevitAddIns>
          <AddIn Type="Application">
            <Name>ISPG Conversion Tools</Name>
            <Assembly>ISPG.Conversion.dll</Assembly>
            <AddInId>F8C6D928-9E4B-4B8A-8D3F-5E6C7D8E9F0A</AddInId>
            <FullClassName>ISPG.Conversion.Application</FullClassName>
            <VendorId>ISPG</VendorId>
            <VendorDescription>Insite Property Group</VendorDescription>
          </AddIn>
        </RevitAddIns>
        "@
        $addinContent | Out-File "installer\Revit2025\ISPG.Conversion.addin" -Encoding UTF8
        
        # Create installer script
        $installerScript = @"
        `@echo off
        REM ISPG Conversion Tools - One-Click Installer
        echo ================================================================
        echo ISPG Conversion Tools - Installer
        echo ================================================================
        echo.
        echo Installing for Revit 2025...
        echo.
        
        set TARGET_DIR=%APPDATA%\Autodesk\Revit\Addins\2025
        
        REM Create target directory if it doesn't exist
        if not exist "%TARGET_DIR%" mkdir "%TARGET_DIR%"
        
        REM Copy files
        copy /Y "%~dp0Revit2025\ISPG.Conversion.dll" "%TARGET_DIR%\"
        copy /Y "%~dp0Revit2025\ISPG.Conversion.addin" "%TARGET_DIR%\"
        
        echo.
        echo ================================================================
        echo Installation Complete!
        echo ================================================================
        echo.
        echo Files installed to:
        echo %TARGET_DIR%
        echo.
        echo Next steps:
        echo 1. Launch Revit 2025
        echo 2. Look for 'ISPG Conversion Tools' in the ribbon
        echo.
        pause
        "@
        $installerScript | Out-File "installer\INSTALL.bat" -Encoding ASCII
        
        # Create README
        $readme = @"
        # ISPG Conversion Tools
        
        ## Installation Instructions
        
        1. Double-click INSTALL.bat
        2. Launch Revit 2025
        3. Look for 'ISPG Conversion Tools' in the ribbon
        
        ## What's Included
        
        - Unit Numbering tool
        - Unit Numbering QA/QC
        - Unit Material Management
        - Import/Export Units (Legacy)
        - Import/Export Parking (Legacy)
        - Import/Export Shell (Legacy)
        
        ## Manual Installation
        
        If the installer doesn't work, manually copy these files to:
        %APPDATA%\Autodesk\Revit\Addins\2025\
        
        Files to copy:
        - Revit2025\ISPG.Conversion.dll
        - Revit2025\ISPG.Conversion.addin
        
        ---
        Built with GitHub Actions
        "@
        $readme | Out-File "installer\README.txt" -Encoding UTF8
    
    - name: Create ZIP package
      run: |
        Compress-Archive -Path installer\* -DestinationPath ISPG-Conversion-Installer.zip
    
    - name: Upload installer as artifact
      uses: actions/upload-artifact@v4
      with:
        name: ISPG-Conversion-Installer
        path: ISPG-Conversion-Installer.zip
    
    - name: Create Release (on tag push)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ISPG-Conversion-Installer.zip
        body: |
          ## ISPG Conversion Tools - Revit Add-in
          
          ### Installation
          1. Download `ISPG-Conversion-Installer.zip` below
          2. Extract the ZIP file
          3. Double-click `INSTALL.bat`
          4. Launch Revit 2025
          
          ### What's New
          - Automated build via GitHub Actions
          - One-click installer
          
          Built for Revit 2025 | .NET Framework 4.8
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
